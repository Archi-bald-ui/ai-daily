name: Summarize Papers

on:
  workflow_dispatch: # 手动触发，为尚无摘要的论文批量生成中文摘要
  workflow_run:
    workflows: ["Daily AI News Fetch"] # 每日抓取完成后自动接力生成摘要
    types: [completed]

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "bot@ai-daily.local"

      - name: Generate summaries
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL || 'MiniMax-M2.7' }}
          PUSH_EACH: "1"
        run: python scripts/summarize.py

      - name: Commit and push
        if: always()
        run: |
          git add docs/data/summaries
          git diff --quiet --cached || git commit -m "summaries $(date -u +%Y-%m-%d)"
          git push || true
