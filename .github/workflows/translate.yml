name: Translate Titles

on:
  workflow_dispatch: # 手动触发，为英文标题补充中文翻译

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "bot@ai-daily.local"

      - name: Translate titles
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL || 'MiniMax-M2.7' }}
        run: python scripts/translate.py

      - name: Commit and push
        if: always()
        run: |
          git add docs/data/articles.json
          git diff --quiet --cached || git commit -m "translate titles $(date -u +%Y-%m-%d)"
          git push || true
