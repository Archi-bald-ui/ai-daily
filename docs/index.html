<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Daily - 每日AI资讯精选</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="container header-content">
      <h1 class="logo">AI <span>Daily</span></h1>
      <p class="tagline">每日精选 · AI 评分筛选 · 自动更新</p>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="搜索标题或来源...">
      </div>
    </div>
  </header>

  <nav class="container categories">
    <button class="cat-btn active" data-category="all">全部</button>
    <button class="cat-btn" data-category="技术博客">技术博客</button>
    <button class="cat-btn" data-category="新闻资讯">新闻资讯</button>
    <button class="cat-btn" data-category="论文">论文</button>
    <button class="cat-btn" data-category="中文资讯">中文资讯</button>
  </nav>

  <main class="container">
    <div class="date-nav">
      <button id="prev-date" title="前一天">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span id="current-date"></span>
      <button id="next-date" title="后一天">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </button>
      <button id="pick-date" class="date-pick-btn" title="选择日期">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </button>
      <input type="date" id="date-picker" class="date-picker-hidden">
    </div>

    <div class="stats" id="stats"></div>

    <div id="articles" class="articles-list"></div>

    <div id="empty-state" class="empty-state" style="display:none">
      <div class="empty-icon">📭</div>
      <p>当日暂无符合条件的资讯</p>
      <p class="empty-hint">试试切换日期或分类</p>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>数据每日 08:00 CST 自动更新 · MiniMax AI 评分筛选</p>
      <p id="last-updated"></p>
    </div>
  </footer>

  <div id="reader-modal" class="reader-modal" style="display:none">
    <div class="reader-backdrop"></div>
    <div class="reader-panel">
      <button class="reader-close" title="关闭">&times;</button>
      <div id="reader-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
